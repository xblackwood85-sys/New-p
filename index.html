<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Tap In</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bubble-container">
        <img src="https://i.pravatar.cc/150?u=a1" class="user-bubble b1" alt="User">
        <img src="https://i.pravatar.cc/150?u=a2" class="user-bubble b2" alt="User">
        <img src="https://i.pravatar.cc/150?u=a3" class="user-bubble b3" alt="User">
        <img src="https://i.pravatar.cc/150?u=a4" class="user-bubble b4" alt="User">
    </div>

    <main class="hero">
        <h1 class="big-logo">connect</h1>
        
        <div class="tagline-stack">
            <p class="main-tag">Connect. Create. Belong.</p>
            <p class="sub-tag">Tap in. Tune in. Connect.</p>
        </div>
        
        <div class="actions">
            <button class="glass-btn primary">Create Account</button>
            <button class="glass-btn secondary">Sign In</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
