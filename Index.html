<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | The Future of Social</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bubble-container" id="bubbleContainer">
        <img src="https://i.pravatar.cc/150?u=1" class="user-bubble b1" alt="User">
        <img src="https://i.pravatar.cc/150?u=2" class="user-bubble b2" alt="User">
        <img src="https://i.pravatar.cc/150?u=3" class="user-bubble b3" alt="User">
        <img src="https://i.pravatar.cc/150?u=4" class="user-bubble b4" alt="User">
        <img src="https://i.pravatar.cc/150?u=5" class="user-bubble b5" alt="User">
    </div>

    <main class="hero-section">
        <h1 class="logo">connect.</h1>
        <p class="tagline">The world is waiting. Join the circle.</p>
        
        <div class="btn-group">
            <button id="signUpBtn" class="btn btn-primary">Create Account</button>
            <button id="signInBtn" class="btn btn-outline">Sign In</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
